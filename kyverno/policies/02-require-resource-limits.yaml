apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-resource-limits
  annotations:
    policies.kyverno.io/title: Exigir requests + limits
    policies.kyverno.io/category: Resource Management
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      Todo container debe declarar CPU y memory (requests + limits).
      Previene noisy neighbor y agotamiento del nodo.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: validate-limits
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: [forseti, forseti-staging, forseti-prod]
      validate:
        message: "Cada container debe declarar resources.requests y resources.limits (CPU + memory)."
        pattern:
          spec:
            containers:
              - name: "?*"
                resources:
                  requests:
                    memory: "?*"
                    cpu: "?*"
                  limits:
                    memory: "?*"
                    cpu: "?*"

# Valores por defecto (staging local en kind)
namespace: forseti

image:
  registry: ghcr.io
  repository: tarius-s-a-s/forseti-devsecops
  backendTag: "latest"
  frontendTag: "latest"
  pullPolicy: IfNotPresent

backend:
  replicas: 1
  service:
    port: 8080
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  env:
    SPRING_PROFILES_ACTIVE: prod
    SERVER_PORT: "8080"
    POSTGRES_HOST: forseti-postgres
    POSTGRES_PORT: "5432"
    POSTGRES_DB: forseti_prod
    FORSETI_BASE_URL: http://forseti.local
    # Correo (Mailpit local — no autenticado)
    BREVO_SMTP_HOST: mailpit
    BREVO_SMTP_PORT: "1025"
    BREVO_SMTP_USER: ""
    BREVO_SMTP_PASSWORD: ""
    BREVO_API_KEY: disabled
    MAIL_FROM_NAME: "Forseti (demo)"
    MAIL_FROM_ADDRESS: "no-reply@forseti.demo"
    # R2 backups desactivados en demo
    R2_ACCESS_KEY_ID: ""
    R2_SECRET_ACCESS_KEY: ""
    R2_ENDPOINT: ""
    R2_BUCKET: ""

frontend:
  replicas: 1
  service:
    port: 80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

postgres:
  enabled: true
  image: postgres:16-alpine
  storage: 2Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Secrets se crean por separado (kubectl create secret …) o desde Vault/Sealed-Secrets
# Referenciados desde deployment via envFrom
secrets:
  externalSecretName: forseti-secrets

ingress:
  enabled: true
  className: nginx
  host: forseti.local

# Firma de imágenes (validada por Kyverno)
signing:
  enabled: true
  cosignPublicKey: |
    -----BEGIN PUBLIC KEY-----
    (se rellena tras `cosign generate-key-pair`)
    -----END PUBLIC KEY-----

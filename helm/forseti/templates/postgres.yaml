{{- if .Values.postgres.enabled -}}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: forseti-postgres-pvc
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "forseti.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.postgres.storage }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: forseti-postgres
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "forseti.labels" . | nindent 4 }}
spec:
  serviceName: forseti-postgres
  replicas: 1
  selector:
    matchLabels:
      {{- include "forseti.postgres.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "forseti.postgres.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          ports:
            - containerPort: 5432
              name: postgres
          envFrom:
            - secretRef:
                name: {{ .Values.secrets.externalSecretName }}
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)"]
            initialDelaySeconds: 30
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: forseti-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: forseti-postgres
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "forseti.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  selector:
    {{- include "forseti.postgres.selectorLabels" . | nindent 4 }}
{{- end }}

# Secret de EJEMPLO — en producción esto lo maneja
# Sealed-Secrets / External-Secrets-Operator / Vault (NO se commitea)
#
# Este template genera el Secret solo si NO existe (helm lookup).
# Para producción real: eliminar este template y crear el Secret por fuera.
{{- $existing := (lookup "v1" "Secret" .Values.namespace .Values.secrets.externalSecretName) }}
{{- if not $existing }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.externalSecretName }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "forseti.labels" . | nindent 4 }}
  annotations:
    forseti.tarius.ec/note: "DEMO ONLY — usar Sealed-Secrets o Vault en prod"
type: Opaque
stringData:
  POSTGRES_USER: forseti
  POSTGRES_PASSWORD: forseti_demo_change_me
  POSTGRES_DB: forseti_prod   # que Postgres cree la DB con el nombre que espera el backend
  # Llave maestra AES-256-GCM DEV — regenerar en prod: openssl rand -base64 32
  FORSETI_MASTER_KEY: "KfB+gReHrhqs1f4dOQRYY31HpGdLOzEFTVonURXqqcM="
  BREVO_SMTP_USER: ""
  BREVO_SMTP_PASSWORD: ""
{{- end }}

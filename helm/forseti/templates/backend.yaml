apiVersion: apps/v1
kind: Deployment
metadata:
  name: forseti-backend
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "forseti.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "forseti.backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "forseti.backend.selectorLabels" . | nindent 8 }}
      annotations:
        # Fuerza rollout cuando cambia el secret
        checksum/secret: {{ toString .Values.secrets.externalSecretName | sha256sum }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backend
          image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}/backend:{{ .Values.image.backendTag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - secretRef:
                name: {{ .Values.secrets.externalSecretName }}
          env:
            {{- range $k, $v := .Values.backend.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # Spring escribe temp
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: forseti-backend
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "forseti.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: http
      name: http
  selector:
    {{- include "forseti.backend.selectorLabels" . | nindent 4 }}

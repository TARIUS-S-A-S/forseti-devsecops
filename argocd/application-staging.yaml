apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: forseti-staging
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io/foreground
spec:
  project: forseti
  # Multiple sources: chart en un repo, values en otro (Argo CD >=2.6)
  sources:
    # Fuente 1: el Helm chart (repo de código)
    - repoURL: https://github.com/TARIUS-S-A-S/forseti-devsecops.git
      targetRevision: main
      path: helm/forseti
      helm:
        valueFiles:
          - $values/environments/staging/values.yaml
    # Fuente 2: los values (repo GitOps — SOURCE OF TRUTH)
    - repoURL: https://github.com/TARIUS-S-A-S/forseti-devsecops-gitops.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: forseti-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 10

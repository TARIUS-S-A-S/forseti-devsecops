# CD ligero — solo dispara en push a `dev`
# Build imagen sin firma keyless (dev no llega a prod) + bump al gitops repo → Argo CD staging
name: CD staging (dev)

on:
  push:
    branches: [dev]

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ${{ github.repository }}/backend
  IMAGE_FRONTEND: ${{ github.repository }}/frontend

jobs:
  build-and-deploy-staging:
    name: Build + push staging → bump gitops
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        component: [backend, frontend]
    outputs:
      short_sha: ${{ steps.sha.outputs.short }}
    steps:
      - uses: actions/checkout@v4

      - name: Short SHA
        id: sha
        run: echo "short=$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT

      - name: Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image name
        id: img
        run: |
          if [ "${{ matrix.component }}" = "backend" ]; then
            echo "name=${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}" >> $GITHUB_OUTPUT
          else
            echo "name=${{ env.REGISTRY }}/${{ env.IMAGE_FRONTEND }}" >> $GITHUB_OUTPUT
          fi

      - name: Build + push (staging tag)
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.component }}
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:staging
            ${{ steps.img.outputs.name }}:sha-${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  bump-gitops:
    name: Bump tag en repo GitOps → staging
    needs: build-and-deploy-staging
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gitops repo
        uses: actions/checkout@v4
        with:
          repository: TARIUS-S-A-S/forseti-devsecops-gitops
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: Update staging values
        run: |
          cd gitops
          SHORT=${{ needs.build-and-deploy-staging.outputs.short_sha }}
          sed -i "s|backendTag:.*|backendTag: \"sha-$SHORT\"|" environments/staging/values.yaml
          sed -i "s|frontendTag:.*|frontendTag: \"sha-$SHORT\"|" environments/staging/values.yaml

      - name: Commit + push
        run: |
          cd gitops
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "sin cambios" && exit 0
          git commit -m "chore(staging): bump a sha-${{ needs.build-and-deploy-staging.outputs.short_sha }} (${{ github.sha }})"
          git push origin main

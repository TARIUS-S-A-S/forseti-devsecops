name: SCA — OWASP Dependency-Check

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  schedule:
    - cron: '0 7 * * 1'  # Lunes 07:00 UTC

jobs:
  owasp-dependency-check:
    name: OWASP Dep-Check (Java + JS)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps (para escaneo SCA)
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Cache Dependency-Check data (NVD)
        uses: actions/cache@v4
        with:
          path: dep-check-data
          key: dep-check-nvd-${{ runner.os }}-v1

      - name: Run OWASP Dependency-Check (Docker)
        run: |
          mkdir -p reports dep-check-data
          docker run --rm \
            -v "$PWD:/src:z" \
            -v "$PWD/reports:/report" \
            -v "$PWD/dep-check-data:/usr/share/dependency-check/data" \
            owasp/dependency-check:latest \
              --project "forseti-devsecops" \
              --scan /src \
              --exclude "**/node_modules/**/node_modules/**" \
              --exclude "**/target/**" \
              --exclude "**/dist/**" \
              --format ALL \
              --out /report \
              --failOnCVSS 8 \
              --enableRetired \
              --nvdApiKey "${{ secrets.NVD_API_KEY }}" || \
            (echo "⚠️ Dep-Check terminó con findings HIGH+, revisar reporte" && exit 0)

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-report
          path: reports/
          retention-days: 30

      - name: Upload SARIF (si existe)
        if: always() && hashFiles('reports/dependency-check-report.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: reports/dependency-check-report.sarif
          category: dep-check

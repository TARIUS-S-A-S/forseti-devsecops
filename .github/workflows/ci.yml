name: CI (all branches + PR) — Build + Test

# Corre SIEMPRE:
#   - push a main o dev
#   - PR contra main o dev (feature branches)
# NO despliega nada. Solo verifica que el código compila y pasa los tests.
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — Java 21 + Maven
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Verify (compile + test + ArchUnit)
        working-directory: backend
        run: mvn -B verify -Dmaven.test.failure.ignore=false

      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: backend/target/surefire-reports/
          retention-days: 7

      - name: Upload jar
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: forseti-backend-jar
          path: backend/target/*.jar
          retention-days: 7

  frontend:
    name: Frontend — Node 22 + Vue 3
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install (npm ci)
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: TypeScript check
        working-directory: frontend
        run: npx vue-tsc --noEmit

      - name: Lint
        working-directory: frontend
        run: npx eslint . --ext .vue,.ts

      - name: Unit tests (vitest)
        working-directory: frontend
        run: npx vitest run

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload dist
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: forseti-frontend-dist
          path: frontend/dist/
          retention-days: 7

version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Guayaquil"
    open-pull-requests-limit: 5
    target-branch: "dev"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      spring:
        patterns: ["org.springframework*"]
      testing:
        patterns: ["org.junit*", "org.assertj*", "org.testcontainers*", "com.tngtech.archunit*"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "dev"
    commit-message:
      prefix: "ci"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "dev"
    commit-message:
      prefix: "docker"

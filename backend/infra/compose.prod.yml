# Forseti — PRODUCCIÓN (VPS Vultr Miami)
# Stack: Postgres 17 + backend Spring Boot + frontend Vue (estático) + Caddy
# Secrets vienen de /etc/forseti/*.env (chmod 600, owner root)

services:
  postgres:
    image: postgres:17-alpine
    container_name: forseti-prod-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - forseti-prod-postgres:/var/lib/postgresql/data
    networks: [internal]
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  backend:
    image: ghcr.io/tarius-s-a-s/forseti-backend:${BACKEND_TAG}  # FIX A8: sin default latest
    container_name: forseti-prod-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - /etc/forseti/db.env
      - /etc/forseti/brevo.env
      - /etc/forseti/r2.env
      - /etc/forseti/sri.env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8080
    volumes:
      - /etc/forseti/sri:/etc/forseti/sri:ro     # certificado .p12 read-only
    networks: [internal, public]  # public para llamar SRI/Brevo/R2 (outbound)
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.8'

  frontend:
    image: ghcr.io/tarius-s-a-s/forseti-frontend:${FRONTEND_TAG}
    container_name: forseti-prod-frontend
    restart: unless-stopped
    networks: [internal]
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.2'

  caddy:
    image: caddy:2-alpine
    container_name: forseti-prod-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - forseti-prod-caddy-data:/data
      - forseti-prod-caddy-config:/config
    networks: [internal, public]
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.3'

networks:
  internal:
    driver: bridge
    internal: true   # red sin internet — solo intra-service (postgres ↔ backend)
  public:
    driver: bridge   # red con internet (backend → SRI/Brevo/R2, caddy → Let's Encrypt)

volumes:
  forseti-prod-postgres:
  forseti-prod-caddy-data:
  forseti-prod-caddy-config:

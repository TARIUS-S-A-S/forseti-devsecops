# Kind cluster de 3 nodos (1 control-plane + 2 workers)
# Expone :80 y :443 del host al Ingress del cluster.
#
# Uso:
#   kind create cluster --config k8s/kind-config.yaml --name forseti
#   kind delete cluster --name forseti
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: forseti
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 8000        # http://localhost:8000 → Ingress
        protocol: TCP
      - containerPort: 443
        hostPort: 8443        # https://localhost:8443 → Ingress
        protocol: TCP
  - role: worker
  - role: worker

# Rutas de imágenes locales (para load a kind sin registry)
containerdConfigPatches:
  - |-
    [plugins."io.containerd.grpc.v1.cri".registry.mirrors."ghcr.io"]
      endpoint = ["https://ghcr.io"]
